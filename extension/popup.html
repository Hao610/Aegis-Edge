<!DOCTYPE html>
<html>

<head>
    <title>Aegis Edge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 320px;
            padding: 15px;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
        }

        h2 {
            margin-top: 0;
            color: #0ea5e9;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-box {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stats-title {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-number {
            font-size: 32px;
            font-weight: bold;
            color: #10b981;
            margin: 10px 0 0 0;
        }

        .status {
            margin-top: 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 5px #10b981;
        }
    </style>
</head>

<body>
    <h2><span style="font-size: 20px;">⛨</span> Aegis Edge</h2>
    <div class="stats-box">
        <div class="stats-title">Phishing Threats Blocked</div>
        <div class="stats-number" id="threatCount">0</div>
    </div>
    <div class="status">
        <div class="indicator"></div>
        Engine Active & Securing Webmail
    </div>
    <script>
        chrome.storage.local.get(['threatsBlocked'], (result) => {
            document.getElementById('threatCount').innerText = result.threatsBlocked || 0;
        });
    </script>
</body>

</html>
